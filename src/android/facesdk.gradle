// Gradle reference for cordova-plugin-face-sdk
// This file is included by Cordova build system

repositories {
    flatDir {
        dirs 'libs', 'src/main/libs'
    }
}

dependencies {
    // Face SDK (AAR)
    implementation(name: 'facekit-release', ext: 'aar')

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // Material Design 3 (required for FaceSDK UI themes)
    implementation 'com.google.android.material:material:1.11.0'

    // Camera2 (CameraX) - Use 1.4.1+ for 16KB page alignment support (Android 15+)
    implementation 'androidx.camera:camera-core:1.4.1'
    implementation 'androidx.camera:camera-camera2:1.4.1'
    implementation 'androidx.camera:camera-lifecycle:1.4.1'
    implementation 'androidx.camera:camera-view:1.4.1'

}

android {
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        pickFirst '**/libc++_shared.so'
    }
}
